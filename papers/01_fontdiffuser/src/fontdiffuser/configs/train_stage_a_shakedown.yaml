# Stage A shakedown — 200 synthetic steps on cuda:0.
#
# Purpose: validate the full Phase-3 pipeline end-to-end on the lab server
# (CUDA build, DataLoader, model fwd/bwd, ckpt save) BEFORE we invest in
# writing the real TTF cross-font dataset. Mirrors train_stage_a_ttf.yaml
# but with max_steps reduced and log_every tightened.
seed: 42
batch_size: 16
# Windows DataLoader: keep workers=0 for the shakedown. The Windows spawn
# protocol pickles the synthetic dataset closures; running in the main
# process avoids the worker timeout that hung the first 200-step retry.
num_workers: 0
learning_rate: 1.0e-4
weight_decay: 0.0
grad_clip: 1.0
# synthetic_length=64 + bs=16 => only 4 batches/epoch, so we need many epochs
# to reach max_steps. The trainer cycles the synthetic dataset.
max_epochs: 100
max_steps: 200
log_every: 20
cfg_drop_prob: 0.1
scr_weight: 0.0
scr_embed_dim: 128
ckpt_dir: papers/01_fontdiffuser/outputs/stage_a_shakedown

diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  beta_schedule: linear
  prediction_target: epsilon

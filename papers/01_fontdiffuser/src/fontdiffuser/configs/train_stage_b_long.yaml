# 01 FontDiffuser Stage B-long: extend stage_b/fontdiffuser_last.pt by 50k steps.
# Warm-start LR rule: lr/10 vs the SB-midtrain to avoid destroying learned weights.
seed: 42
batch_size: 16
num_workers: 0
learning_rate: 5.0e-6
weight_decay: 0.0
grad_clip: 1.0
max_epochs: 50
max_steps: 50000
log_every: 1000
cfg_drop_prob: 0.1
scr_weight: 0.1
scr_embed_dim: 128
ckpt_dir: papers/01_fontdiffuser/outputs/stage_b_long

diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  beta_schedule: linear
  prediction_target: epsilon

# Stage A v1 — real TTF cross-font pretrain on the lab server.
#
# 5000 steps × bs=16 ≈ 80k samples seen. Calibrated for a single RTX 6000 Ada
# GPU: synthetic shakedown showed ~63 samples/s, real TTF will add PIL render
# overhead so estimate 20-30 min wall clock.
#
# What changed vs the shakedown:
#   - source: ttf (real cross-font pairs from 13 OFL fonts)
#   - num_workers: 0 still — Windows DataLoader spawn issue not yet diagnosed
#   - max_steps: 5000 (up from 200)
#   - log_every: 100 (was 20; 50 log lines is plenty for 5k steps)
seed: 42
batch_size: 16
num_workers: 0
learning_rate: 1.0e-4
weight_decay: 0.0
grad_clip: 1.0
max_epochs: 100
max_steps: 5000
log_every: 100
cfg_drop_prob: 0.1
scr_weight: 0.0
scr_embed_dim: 128
ckpt_dir: papers/01_fontdiffuser/outputs/stage_a_ttf_v1

diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  beta_schedule: linear
  prediction_target: epsilon

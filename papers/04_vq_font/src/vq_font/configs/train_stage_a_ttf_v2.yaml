# 04 Stage A v2 — 200k step VQGAN training warm-start from v1.
# VQGAN typically needs 100k+ step to converge codebook.
seed: 42
batch_size: 16
num_workers: 0
learning_rate: 1.0e-4
weight_decay: 0.0
grad_clip: 1.0
max_epochs: 1000
max_steps: 200000
log_every: 2000
simple_loss: true
ckpt_dir: papers/04_vq_font/outputs/stage_a_ttf_v2

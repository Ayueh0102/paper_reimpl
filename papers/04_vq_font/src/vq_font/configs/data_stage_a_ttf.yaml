  lxgw_wenkai_light: kai
  lxgw_wenkai_medium: kai
  ma_shan_zheng: xing
  long_cang: cao
  liu_jian_mao_cao: cao
  zcool_xiaowei: ming
  zcool_kuaile: decor
  zcool_qingke_huangyou: hei
  noto_sans_sc: hei
  noto_sans_tc: hei
  noto_serif_sc: ming
  noto_serif_tc: ming

# Stage B — multi-writer Transformer fine-tune on Ernantang.
#
# Anneal-on-fine-tune defaults (paper does not separate B/C); kept to
# match the rest of the Plan A scaffold. Inherits Stage A optimizer
# settings except for a lower learning rate.
stage: transformer
seed: 42
batch_size: 32
num_workers: 4
g_lr: 1.0e-4
adam_betas: [0.0, 0.9]
weight_decay: 0.0
grad_clip: 1.0
max_epochs: 1
max_steps: 5000
log_every: 100
scheduler:
  type: step
  step_size: 1000
  gamma: 0.95
freeze_vqgan: partial
vqgan_ckpt: papers/04_vq_font/outputs/stage_0_vqgan_v3/vqgan_last.pt
ckpt_dir: papers/04_vq_font/outputs/stage_b

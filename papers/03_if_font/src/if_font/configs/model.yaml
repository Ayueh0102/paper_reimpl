# IF-Font model architecture — Phase 2 (alignment to Stareven233/IF-Font).
#
# Paper-cited values (NeurIPS 2024, train.yaml + base.yaml):
#   * VQGAN codebook size = 256, downsample factor = 8, embed_dim = 4 (RGB)
#   * Transformer decoder: 10 blocks, 8 heads, d_model = 384
#   * 1 self-attn + 1 cross-attn + 1 FFN per block (NOT 2+1 — paper-note was wrong)
#   * dropout = 0.1, bias = False
#   * IDS max_len = 35
#   * num_refs = 3 (val) / 4 (train, +1 if odd)
#
# Resolved per reports/github_diff.md Phase-2 corrections (P0 #1, #2, #7).
model:
  image_size: 128
  in_channels: 3                # RGB — pretrained CompVis VQGAN expects RGB

  # Frozen pretrained VQGAN (CompVis vq-f8-n256). Stage-A pretraining is gone.
  vq:
    embedding_dim: 4            # CompVis pretrained latent dim
    codebook_size: 256          # paper-cited
    downsample_factor: 8

  # IDS encoder — bare embedding tables (no Transformer encoder anymore)
  ids_vocab_size: 8192          # upper bound; runtime trims to fitted vocab
  ids_max_len: 35               # official base.yaml:67

  # AR Transformer decoder (paper-cited 10 / 8 / 384)
  d_model: 384
  n_heads: 8
  n_blocks: 10
  ffn_mult: 4
  dropout: 0.1                  # official base.yaml:62
  bias: false                   # official base.yaml:63

  # Reference handling
  n_refs: 3                     # train.yaml:40

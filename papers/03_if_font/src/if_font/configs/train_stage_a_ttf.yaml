# Stage A — NO-OP in Phase 2 (VQGAN is now frozen pretrained CompVis).
#
# Kept as a back-compat shim. Setting `max_steps: 0` means the loop will not
# execute training; the entrypoint still constructs the model + checkpoint
# directory so downstream scripts that probe `experiments/03_if_font/outputs/stage_a`
# do not blow up.
seed: 42
batch_size: 8
num_workers: 0
base_learning_rate: 4.5e-6
weight_decay: 0.01
grad_clip: 0.0
max_epochs: 0
max_steps: 0
log_every: 50

# Phase-2 loss weight; sup_cl is inactive when refs are zero / batch all-same-font.
sup_cl_weight: 0.5

# IDS resolver: BabelStone + ids_iffont (vendored).
babelstone_path: ids/cn_mainland/babelstone_cjk_ids.txt
ids_iffont_path: ids/cn_mainland/ids_iffont.txt

# Optional pretrained VQGAN path (e.g. ../checkpoints/vqgan_openImages_f8_n256).
# Leave empty to use the random-weight stub (smoke-only).
vqgan_path: ""

ckpt_dir: experiments/03_if_font/outputs/stage_a

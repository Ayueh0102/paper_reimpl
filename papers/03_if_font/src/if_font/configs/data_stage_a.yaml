# Stage A — DROPPED in Phase 2.
#
# Phase 1 used Stage A as VQGAN-from-scratch pretraining. Phase 2 uses the
# frozen pretrained CompVis vq-f8-n256, so Stage A is no longer a training
# stage. This file is retained as a shim for back-compat with older entry
# points: it points at the same multi-writer data as Stage B but runs zero
# steps unless `max_steps` is overridden in the matching train YAML.
source: synthetic               # synthetic | manifest
synthetic_length: 64
max_refs: 3                     # Phase 2 default (was 0 in Phase 1)
writer_vocab_size: 13
style_family_vocab_size: 13
char_vocab_size: 64
script_vocab_size: 4
seed: 42

manifest: a_main_clean_smoke_a0.jsonl
content_channels: [bitmap]
ids_lookup_path: ~/Char/datasets/ids/scripts/lookup_ids.py

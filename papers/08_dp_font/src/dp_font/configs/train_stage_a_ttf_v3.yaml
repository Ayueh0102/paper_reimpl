# 08 Stage A v3 — 200k step continuation warm-start from v2 ckpt.
# v2 already converged loss ~0.008; v3 adds 200k more at lower LR for
# finer refinement. bs=32 nw=8 + persistent_workers for higher GPU util.
seed: 42
batch_size: 32
num_workers: 8
lr: 1.0e-5
beta1: 0.9
beta2: 0.999
weight_decay: 0.0
grad_clip: 1.0
beta_schedule: cosine
beta_start: 1.0e-4
beta_end: 2.0e-2
timesteps: 1000
cfg_dropout: 0.1
max_epochs: 1000
max_steps: 200000
log_every: 2000
ckpt_dir: papers/08_dp_font/outputs/stage_a_ttf_v3

# Stage C — Ernantang target style fine-tune.
seed: 42
batch_size: 8
num_workers: 2
learning_rate: 2.0e-5
weight_decay: 0.0
grad_clip: 1.0
max_epochs: 1
max_steps: 50000
log_every: 200
cfg_drop_prob: 0.1
pinn_weight: 0.1                        # [guessed] ramp up PINN at convergence
pinn_weights:
  weight_diffusion: 1.0
  weight_nib: 1.0
  weight_continuity: 0.5
  nu: 1.0
skeleton_channel_index: 1
ckpt_dir: experiments/08_dp_font/outputs/stage_c

diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  beta_schedule: cosine
  prediction_target: epsilon

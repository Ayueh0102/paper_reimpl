# Stage B — DP-Font ablation: PINN OFF (pinn_weight=0).
# Same as train_stage_b_midtrain.yaml except pinn_weight=0.
# Used to measure the marginal contribution of the PINN physical priors.
seed: 42
batch_size: 16
num_workers: 0
learning_rate: 5.0e-5
weight_decay: 0.0
grad_clip: 1.0
max_epochs: 1
max_steps: 5000
log_every: 100
cfg_drop_prob: 0.1
pinn_weight: 0.0
skeleton_channel_index: 1
ckpt_dir: papers/08_dp_font/outputs/stage_b_pinn0

diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2
  beta_schedule: cosine
  prediction_target: epsilon

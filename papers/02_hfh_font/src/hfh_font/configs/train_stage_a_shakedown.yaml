# Stage A shakedown — 200 synthetic steps on cuda:1.
#
# Purpose: validate the Phase-3 pipeline (CUDA, DataLoader, fwd/bwd, ckpt
# save) for 02_hfh_font, parallel to 01's Stage A v3 long-run on cuda:0.
# Synthetic-only since 02 hasn't been wired to TTF cross-font yet — that
# adapter waits for 01's v3 to finish so we can reuse the shared dataset.
stage: a
seed: 42
batch_size: 8                # smaller for 02 (multi-ref/multi-channel content)
lr: 1.0e-4
adam_betas: [0.9, 0.999]
weight_decay: 0.01
grad_clip: 1.0
beta_schedule: linear
beta_start: 1.0e-4
beta_end: 2.0e-2
cfg_dropout: 0.1
max_steps: 200
log_every: 20
ckpt_dir: papers/02_hfh_font/outputs/stage_a_shakedown

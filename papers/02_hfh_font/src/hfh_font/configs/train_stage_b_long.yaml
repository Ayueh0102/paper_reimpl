# 02 HFH-Font Stage B-long: extend stage_b/hfh_font_last.pt by 30k steps.
# Latent-space DDPM, so steps roughly map differently to wall-clock vs 08.
stage: b
seed: 1
batch_size: 16
lr: 5.0e-6                 # warm-start LR rule: lr/10 vs SB-midtrain
adam_betas: [0.9, 0.999]
weight_decay: 0.01
grad_clip: 1.0
beta_schedule: linear
beta_start: 1.0e-4
beta_end: 2.0e-2
cfg_dropout: 0.1
num_workers: 0
max_epochs: 200
max_steps: 80000
log_every: 1000
freeze_vae: true
ckpt_dir: papers/02_hfh_font/outputs/stage_b_long

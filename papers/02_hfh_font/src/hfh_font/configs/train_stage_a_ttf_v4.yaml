# 02 Stage A v4 — 100k U-Net continuation warm-start from v3 ckpt (50k).
# Total effective U-Net training = 150k step on frozen pretrained VAE.
stage: a
seed: 42
batch_size: 8
num_workers: 0
lr: 1.0e-4
adam_betas: [0.9, 0.999]
weight_decay: 0.01
grad_clip: 1.0
beta_schedule: linear
beta_start: 1.0e-4
beta_end: 2.0e-2
cfg_dropout: 0.1
max_epochs: 1000
max_steps: 100000
log_every: 2000
freeze_vae: true
ckpt_dir: papers/02_hfh_font/outputs/stage_a_ttf_v4

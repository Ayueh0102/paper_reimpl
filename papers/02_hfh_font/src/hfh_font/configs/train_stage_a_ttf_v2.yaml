# 02 Stage A v2 — paper-faithful: frozen VAE + train U-Net + ComponentEnc.
#
# Warm-starts model.vae from the VAE pretrain ckpt (--init-ckpt) and
# freezes it (`freeze_vae: true`). The U-Net + ComponentEncoder + Char/
# Writer embeddings are then trained from random init on the latent-space
# diffusion loss. This matches the paper's description of Stage-A:
# "VAE pretrained Stage-A, frozen in Stage-B/C; trained Stage-A onwards
# for the U-Net".
#
# Schedule: 8000 step ≈ 30-40 min on RTX 6000 Ada at HFH's bs=8 / 25M
# diffusion params. Sample after; decide if v3 longer-run is worth it.
stage: a
seed: 42
batch_size: 8
num_workers: 0
lr: 1.0e-4
adam_betas: [0.9, 0.999]
weight_decay: 0.01
grad_clip: 1.0
beta_schedule: linear
beta_start: 1.0e-4
beta_end: 2.0e-2
cfg_dropout: 0.1
max_epochs: 100
max_steps: 8000
log_every: 200
freeze_vae: true
ckpt_dir: papers/02_hfh_font/outputs/stage_a_ttf_v2

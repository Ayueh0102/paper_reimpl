# Stage A — TTF pretrain.
# Paper §訓練配置: batch=64 small / 128 large, 50 epochs small / 20 epochs large.
# We scale to single-GPU 6000 Ada.

stage: a
seed: 0
batch_size: 16          # [guessed] scaled from 64/128 (paper) to 16 for single-GPU
lr: 1.0e-4              # [guessed] standard Adam diffusion lr
adam_betas: [0.9, 0.999]
weight_decay: 0.01      # [guessed]
grad_clip: 1.0
beta_schedule: linear
beta_start: 1.0e-4
beta_end: 2.0e-2
cfg_dropout: 0.1        # [paper-cited] p̂=0.1 (note: paper applies to ref-style replacement; we apply to all cond channels)
max_steps: 100          # smoke / dry-run honors --dry-run override (1 step)
ckpt_dir: outputs/hfh_font/stage_a

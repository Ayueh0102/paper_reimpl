# 02 Stage A TTF v1 — real cross-font pretrain on cuda:1.
#
# Mirror of 01's v1 schedule: 5000 step, bs adapted to HFH's larger
# model. HFH's loss is x0 MSE (target='x0'), so absolute loss values
# are not directly comparable to 01's epsilon-MSE.
stage: a
seed: 42
batch_size: 8
num_workers: 0
lr: 1.0e-4
adam_betas: [0.9, 0.999]
weight_decay: 0.01
grad_clip: 1.0
beta_schedule: linear
beta_start: 1.0e-4
beta_end: 2.0e-2
cfg_dropout: 0.1
max_epochs: 100
max_steps: 5000
log_every: 100
ckpt_dir: papers/02_hfh_font/outputs/stage_a_ttf_v1

# Stage B — multi-writer mid-train. BERT mostly frozen; only the newly added
# writer-name embedding rows train. Cross-attention W_k/W_v still trainable.

seed: 43
batch_size: 2
num_workers: 0
max_epochs: 1
max_steps: 1
lr: 5.0e-6
beta1: 0.9
beta2: 0.999
weight_decay: 0.0
grad_clip: 1.0
log_every: 1

timesteps: 1000
beta_start: 1.0e-4
beta_end: 2.0e-2
beta_schedule: linear

text_encoder:
  freeze: true
  embeddings_trainable: true  # learn writer-name special-token rows

lora:
  enabled: false

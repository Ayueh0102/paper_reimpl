# Stage A — TTF pretrain. BERT frozen; full U-Net trainable; no LoRA.

seed: 42
batch_size: 2                 # smoke / CPU; bump to 16 on A100 to match paper
num_workers: 0
max_epochs: 1
max_steps: 1                  # bumped via CLI for real runs; 1 keeps smoke fast
lr: 1.0e-5                    # paper Table p.3
beta1: 0.9
beta2: 0.999
weight_decay: 0.0
grad_clip: 1.0
log_every: 1

timesteps: 1000
beta_start: 1.0e-4
beta_end: 2.0e-2
beta_schedule: linear         # paper says linear

text_encoder:
  freeze: true                # BERT fully frozen at Stage A
  embeddings_trainable: false

lora:
  enabled: false

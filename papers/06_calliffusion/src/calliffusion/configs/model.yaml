# Calliffusion model config. Paper note p.3: U-Net block widths [320, 640, 1280, 1280],
# BERT emb dim 768. We expose a smoke-friendly small variant (base_channels=64) so
# CPU dry-runs don't OOM; production runs override these via Stage A/B/C train yaml.

unet:
  image_size: 64
  in_channels: 1
  out_channels: 1
  base_channels: 64           # small for smoke; paper uses 320
  channel_mult: [1, 2, 4, 4]  # so stage_channels = [64, 128, 256, 256]
  num_res_blocks: 1
  time_emb_dim: 256
  context_dim: 768            # matches Chinese BERT hidden size
  num_heads: 8
  dropout: 0.0

text_encoder:
  use_bert: false             # smoke: stub. Stage A/B/C yamls override to true.
  hidden_size: 768
  max_length: 16
  model_name: bert-base-chinese
  cache_dir: null

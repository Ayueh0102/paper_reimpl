# Stage C — 二南堂 fine-tune via LoRA on cross-attention projections.
# Base U-Net + BERT both frozen; only LoRA A/B and the writer-name embeddings
# (kept trainable) update.

seed: 44
batch_size: 2
num_workers: 0
max_epochs: 1
max_steps: 1
lr: 1.0e-4                    # higher LR for LoRA params; base is frozen
beta1: 0.9
beta2: 0.999
weight_decay: 0.0
grad_clip: 1.0
log_every: 1

timesteps: 1000
beta_start: 1.0e-4
beta_end: 2.0e-2
beta_schedule: linear

text_encoder:
  freeze: true
  embeddings_trainable: true

lora:
  enabled: true
  rank: 4
  alpha: 8.0
  dropout: 0.0
  target_substrings: [to_q, to_k, to_v, to_out]
  freeze_non_lora: true

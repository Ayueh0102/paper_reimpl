# Stage A training schedule — TTF pretrain for QT-Font (Phase 2 paper-aligned).
#
# Paper-cited config (third_party/05_qt_font/configs/chinesefont_train.yaml):
#   - AdamW lr=1e-4, weight_decay=0.0 (NOT 1e-2 — Phase 1 was wrong)
#   - lr_type=cos, accum=32, batch_size=4/GPU × 8 GPUs → effective batch 1024
#   - T=1000, beta_schedule=cos (Glide cosine), max_epoch=20
#
# Single-GPU/small reproduction: keep effective batch ≈ 1024 via grad_accum.
# Drop micro-batch to 4 to fit a 24 GB GPU at depth=7.
seed: 42
batch_size: 4
num_workers: 0
learning_rate: 1.0e-4
weight_decay: 0.0
grad_clip: 1.0
grad_accum: 256                # 4 micro × 256 = 1024 effective
max_epochs: 20
max_steps: 16000
log_every: 50
ckpt_dir: experiments/05_qt_font/outputs/stage_a

diffusion:
  timesteps: 1000
  schedule: cos
  beta_start: 0.02
  beta_end: 1.0

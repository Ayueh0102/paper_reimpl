# 05 Stage A — TTF cross-font pretrain via shared TTFCrossFontPairDataset.
source: ttf
font_size_ratio: 0.85
ttf_epoch_length: 20000
max_refs: 1
cjk_start: 0x4E00
cjk_end: 0x9FFF
# fonts_root defaults to <data_snapshot>/fonts_free; cache auto-located
# at <fonts_root>/.ttf_supported_chars_128px_0.85.json
char_vocab_size: 4096
writer_vocab_size: 13
script_vocab_size: 5
script_categories:
  lxgw_wenkai_regular: kai
  lxgw_wenkai_light: kai
  lxgw_wenkai_medium: kai
  ma_shan_zheng: xing
  long_cang: cao
  liu_jian_mao_cao: cao
  zcool_xiaowei: ming
  zcool_kuaile: decor
  zcool_qingke_huangyou: hei
  noto_sans_sc: hei
  noto_sans_tc: hei
  noto_serif_sc: ming
  noto_serif_tc: ming

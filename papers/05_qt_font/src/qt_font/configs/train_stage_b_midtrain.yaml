# Stage B — multi-writer mid-train (Phase 2 paper-aligned).
#
# Paper-style: same T=1000 cosine schedule as Stage A, lower lr.
# Smaller effective batch since we have ~24 Ernantang writers.
seed: 1024
batch_size: 4
num_workers: 0
learning_rate: 5.0e-5
weight_decay: 0.0
grad_clip: 1.0
grad_accum: 64                # effective batch 256
max_epochs: 5
max_steps: 6000
log_every: 50
ckpt_dir: experiments/05_qt_font/outputs/stage_b

diffusion:
  timesteps: 1000
  schedule: cos
  beta_start: 0.02
  beta_end: 1.0

# Stage C — Ernantang few-shot fine-tune (Phase 2 paper-aligned).
#
# lr stepped down 10× from Stage A; small batch + no accumulation for fast
# fine-tuning on a single writer.
seed: 2048
batch_size: 4
num_workers: 0
learning_rate: 1.0e-5
weight_decay: 0.0
grad_clip: 1.0
grad_accum: 1
max_epochs: 50
max_steps: 1500
log_every: 25
ckpt_dir: experiments/05_qt_font/outputs/stage_c

diffusion:
  timesteps: 1000
  schedule: cos
  beta_start: 0.02
  beta_end: 1.0

# QT-Font model architecture — Phase 2 paper-aligned.
#
# Mirrors third_party/05_qt_font/configs/chinesefont_train.yaml MODEL block.
# Numbers tagged in reports/blind_impl.md Phase 2 corrections section.
model:
  image_size: 128
  in_channels: 1                # grayscale glyph
  content_channels: 1           # paper: contour-only single channel
  ref_channels: 1

  # Octree geometry.
  full_depth: 4                 # depths [0, full_depth] are dense
  depth: 7                      # 128 px → 7; 256 px → 8; 512 px → 9
  depth_stop: 4                 # U-Net bottleneck depth
  n_states: 3                   # {bg, contour, skeleton}

  # Per-depth channel widths — matches graph_diffusion.py:421
  channels_per_depth: [3, 512, 512, 256, 512, 256, 128, 64, 64, 64]
  cond_dim: 256

  # Diffusion.
  timesteps: 1000
  schedule: cos                 # Glide cosine

  # Conditioning toggles. Paper uses both content+style ("char_font_align").
  use_style: true
  use_content: true

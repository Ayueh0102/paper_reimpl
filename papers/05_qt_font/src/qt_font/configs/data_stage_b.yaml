# Stage B — multi-writer mid-train (twenty-something Ernantang writers).
#
# Bumps writer/char vocab sizes to match the Ernantang split summary:
# 24 writers / ~84 units / ~4659 chars. Still synthetic in Phase 1.
source: synthetic
synthetic_length: 256
max_refs: 4                           # mid-train can use up to 4 refs per query
writer_vocab_size: 24
char_vocab_size: 4659
script_vocab_size: 5
seed: 1024

manifest: b_midtrain_writers24.jsonl
content_channels: [bitmap, sdf]

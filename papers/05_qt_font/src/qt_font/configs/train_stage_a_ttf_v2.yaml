# 05 Stage A v2 — 30k step from scratch at depth=6 (image_size=64).
# 2026-05-13:
#   - depth 7 -> 6: quarters quadtree node count, allows bs>=4 instead of bs=1
#   - drop warm-start (v1 ckpt was depth=7, shape mismatch)
#   - bs 1 -> 8 (memory permits now)
seed: 42
batch_size: 8
num_workers: 4
learning_rate: 1.0e-4
weight_decay: 0.0
grad_clip: 1.0
max_epochs: 1000
max_steps: 30000
log_every: 500
ckpt_dir: papers/05_qt_font/outputs/stage_a_ttf_v2

diffusion:
  timesteps: 1000
  schedule: cos
  beta_start: 0.02
  beta_end: 1.0
